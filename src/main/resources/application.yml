server:
  port: ${WEB_PORT:8080}
  servlet:
    context-path: ${WEB_CONTEXT_PATH:/api/v1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui          # UI будет по /swagger-ui/index.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    persistAuthorization: true # удобно в dev

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,loggers,info}
  endpoint:
    loggers:
      enabled: true
spring:
  application:
    name: gamehub-web
  liquibase:
    change-log: migration/changelog.json
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5435/gamehub}
    user: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5435/gamehub}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DATASOURCE_MAX_POOL_SIZE:20}
  jpa:
    hibernate:
      ddl-auto: none
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_REALM_CERT_URL:http://localhost:80/realms/gamehub/protocol/openid-connect/certs}

  jackson:
    deserialization:
      fail-on-unknown-properties: false

keycloak:
  url: http://localhost:80
  realm: gamehub
  client-id: admin-cli
  username: admin
  password: admin


logging:
  level:
    root: info
